# ====================================================
# docker-compose.yml — оркестрация всех сервисов
# Запуск: docker compose up --build
# ====================================================

services:

  # ── MinIO (S3-compatible object storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  # ── Backend (FastAPI) ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Персистентное хранилище БД и загруженных файлов
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    environment:
      DATABASE_URL: sqlite:////app/data/meeting_analyzer.db
      # LM Studio запущен на хост-машине → host.docker.internal
      LM_STUDIO_URL: http://host.docker.internal:1234
      LM_STUDIO_MODEL: ${LM_STUDIO_MODEL:-local-model}
      SITE_NAME: ${SITE_NAME:-Intelligent Meeting Analyzer}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      DEFAULT_OG_IMAGE: ${DEFAULT_OG_IMAGE:-http://localhost:3000/og-cover.svg}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-voice-translator}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      EXTERNAL_RESOURCES_DEFAULT_QUERY: ${EXTERNAL_RESOURCES_DEFAULT_QUERY:-meeting productivity}
      EXTERNAL_RESOURCES_CONNECT_TIMEOUT_SECONDS: ${EXTERNAL_RESOURCES_CONNECT_TIMEOUT_SECONDS:-3}
      EXTERNAL_RESOURCES_READ_TIMEOUT_SECONDS: ${EXTERNAL_RESOURCES_READ_TIMEOUT_SECONDS:-8}
      EXTERNAL_RESOURCES_MAX_RETRIES: ${EXTERNAL_RESOURCES_MAX_RETRIES:-2}
      EXTERNAL_RESOURCES_CACHE_TTL_SECONDS: ${EXTERNAL_RESOURCES_CACHE_TTL_SECONDS:-900}
      EXTERNAL_RESOURCES_MIN_INTERVAL_SECONDS: ${EXTERNAL_RESOURCES_MIN_INTERVAL_SECONDS:-1.5}
    # Нужно на Linux (на macOS/Windows Docker Desktop host.docker.internal уже доступен)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend (React → nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./fullstack-chat-frontend
      dockerfile: Dockerfile
      args:
        # Относительный путь → nginx проксирует /api → backend:8000
        VITE_API_URL: /api
        VITE_SITE_URL: ${VITE_SITE_URL:-http://localhost:3000}
        VITE_SITE_NAME: ${VITE_SITE_NAME:-Intelligent Meeting Analyzer}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -s /usr/share/nginx/html/index.html && ps | grep -q '[n]ginx: master process'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  app-network:
    driver: bridge

volumes:
  backend_data:
  backend_uploads:
  minio_data:
